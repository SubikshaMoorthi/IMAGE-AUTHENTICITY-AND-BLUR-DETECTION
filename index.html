<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Analysis Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 800px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #718096;
            font-size: 1.1em;
        }

        .upload-section {
            margin-bottom: 40px;
        }

        .upload-area {
            border: 3px dashed #cbd5e0;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #f7fafc, #edf2f7);
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(102, 126, 234, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s ease;
            opacity: 0;
        }

        .upload-area:hover::before {
            opacity: 1;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .upload-area:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .upload-icon {
            font-size: 4em;
            color: #a0aec0;
            margin-bottom: 20px;
            display: block;
        }

        .upload-text {
            color: #4a5568;
            font-size: 1.2em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .upload-subtext {
            color: #718096;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .preview-section {
            margin: 30px 0;
            display: none;
        }

        .preview-container {
            text-align: center;
            background: #f7fafc;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .preview-image:hover {
            transform: scale(1.02);
        }

        .results-section {
            display: none;
            margin-top: 30px;
        }

        .result-card {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            border-left: 5px solid;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-2px);
        }

        .blur-result {
            border-left-color: #4299e1;
        }

        .authenticity-result {
            border-left-color: #48bb78;
        }

        .fake-result {
            border-left-color: #f56565;
        }

        .result-title {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #2d3748;
        }

        .result-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .result-status {
            font-size: 1.4em;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 25px;
            margin: 5px;
        }

        .blur-yes {
            background: linear-gradient(135deg, #fed7d7, #feb2b2);
            color: #c53030;
        }

        .blur-no {
            background: linear-gradient(135deg, #c6f6d5, #9ae6b4);
            color: #22543d;
        }

        .real {
            background: linear-gradient(135deg, #c6f6d5, #9ae6b4);
            color: #22543d;
        }

        .fake {
            background: linear-gradient(135deg, #fed7d7, #feb2b2);
            color: #c53030;
        }

        .accuracy {
            font-size: 1.1em;
            font-weight: 600;
            color: #4a5568;
            background: rgba(102, 126, 234, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            margin: 5px;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #4a5568;
            font-size: 1.1em;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .result-content {
                flex-direction: column;
                align-items: stretch;
            }
            
            .result-status, .accuracy {
                text-align: center;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Image Analysis Tool</h1>
            <p>Upload an image to detect blur and verify authenticity</p>
        </div>

        <div class="upload-section">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <span class="upload-icon">📸</span>
                <div class="upload-text">Click to upload an image</div>
                <div class="upload-subtext">Supports JPG, PNG, JPEG files up to 10MB</div>
            </div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-container">
                <img id="previewImage" class="preview-image" alt="Preview">
                <div style="margin-top: 20px;">
                    <button class="btn" onclick="analyzeImage()">🔬 Analyze Image</button>
                    <button class="btn" onclick="clearImage()" style="background: linear-gradient(135deg, #f56565, #e53e3e);">🗑️ Clear</button>
                </div>
            </div>
        </div>

        <div class="loading" id="loadingSection">
            <div class="spinner"></div>
            <div class="loading-text">Analyzing your image...</div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="result-card blur-result">
                <div class="result-title">🌫️ Blur Detection</div>
                <div class="result-content">
                    <div class="result-status" id="blurStatus">-</div>
                    <div class="accuracy" id="blurAccuracy">-</div>
                </div>
            </div>

            <div class="result-card" id="authenticityCard">
                <div class="result-title">🛡️ Image Authenticity</div>
                <div class="result-content">
                    <div class="result-status" id="authenticityStatus">-</div>
                    <div class="accuracy" id="authenticityAccuracy">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                if (file.size > 10 * 1024 * 1024) {
                    alert('File size should be less than 10MB');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImage = e.target.result;
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('previewSection').style.display = 'block';
                    document.getElementById('resultsSection').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        function analyzeImage() {
            if (!currentImage) {
                alert('Please select an image first');
                return;
            }

            // Show loading
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';

            // Simulate analysis (replace with actual API calls)
            setTimeout(() => {
                // Simulate blur detection
                const blurDetected = Math.random() > 0.5;
                const blurConfidence = (Math.random() * 30 + 70).toFixed(1); // 70-100%
                
                // Simulate authenticity detection
                const isReal = Math.random() > 0.3;
                const authenticityConfidence = (Math.random() * 25 + 75).toFixed(1); // 75-100%
                const category = isReal ? 'Natural Image' : ['Deepfake', 'AI Generated', 'Manipulated'][Math.floor(Math.random() * 3)];

                // Update results
                updateResults(blurDetected, blurConfidence, isReal, authenticityConfidence, category);

                // Hide loading and show results
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('resultsSection').style.display = 'block';
            }, 2000);
        }

        function updateResults(blurDetected, blurConfidence, isReal, authenticityConfidence, category) {
            // Update blur results
            const blurStatus = document.getElementById('blurStatus');
            const blurAccuracy = document.getElementById('blurAccuracy');
            
            blurStatus.textContent = blurDetected ? 'Blurred' : 'Sharp';
            blurStatus.className = 'result-status ' + (blurDetected ? 'blur-yes' : 'blur-no');
            blurAccuracy.textContent = `${blurConfidence}% Confidence`;

            // Update authenticity results
            const authenticityStatus = document.getElementById('authenticityStatus');
            const authenticityAccuracy = document.getElementById('authenticityAccuracy');
            const authenticityCard = document.getElementById('authenticityCard');
            
            authenticityStatus.textContent = isReal ? 'Real' : 'Fake';
            authenticityStatus.className = 'result-status ' + (isReal ? 'real' : 'fake');
            authenticityAccuracy.textContent = `${authenticityConfidence}% (${category})`;
            
            authenticityCard.className = 'result-card ' + (isReal ? 'authenticity-result' : 'fake-result');
        }

        function clearImage() {
            currentImage = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('previewSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('loadingSection').style.display = 'none';
        }

        // Drag and drop functionality
        const uploadArea = document.querySelector('.upload-area');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            uploadArea.style.backgroundColor = 'rgba(102, 126, 234, 0.05)';
        });
        
        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#cbd5e0';
            uploadArea.style.backgroundColor = '';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#cbd5e0';
            uploadArea.style.backgroundColor = '';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('fileInput').files = files;
                handleFileSelect({ target: { files: files } });
            }
        });
    </script>
</body>
</html>
