<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Analysis Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Image Analysis Tool</h1>
            <p>Upload an image to detect blur and verify authenticity</p>
        </div>

        <div class="upload-section">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <span class="upload-icon">📸</span>
                <div class="upload-text">Click to upload an image</div>
                <div class="upload-subtext">Supports JPG, PNG, JPEG files up to 10MB</div>
            </div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        </div>

        <div class="preview-section" id="previewSection">
            <div class="preview-container">
                <img id="previewImage" class="preview-image" alt="Preview">
                <div style="margin-top: 20px;">
                    <button class="btn" onclick="analyzeImage()">🔬 Analyze Image</button>
                    <button class="btn" onclick="clearImage()" style="background: linear-gradient(135deg, #f56565, #e53e3e);">🗑️ Clear</button>
                </div>
            </div>
        </div>

        <div class="loading" id="loadingSection">
            <div class="spinner"></div>
            <div class="loading-text">Analyzing your image...</div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="result-card blur-result">
                <div class="result-title">🌫️ Blur Detection</div>
                <div class="result-content">
                    <div class="result-status" id="blurStatus">-</div>
                    <div class="accuracy" id="blurAccuracy">-</div>
                </div>
            </div>

            <div class="result-card" id="authenticityCard">
                <div class="result-title">🛡️ Image Authenticity</div>
                <div class="result-content">
                    <div class="result-status" id="authenticityStatus">-</div>
                    <div class="accuracy" id="authenticityAccuracy">-</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
